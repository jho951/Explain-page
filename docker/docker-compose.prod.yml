name: explain-page-prod

services:
  explain-page-prod:
    container_name: explain-page-prod
    image: ${EXPLAIN_PAGE_IMAGE:?EXPLAIN_PAGE_IMAGE is required}
    env_file:
      - ../.env.production
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "${EXPLAIN_PAGE_PROD_PORT:-3000}:3000"
    restart: unless-stopped
